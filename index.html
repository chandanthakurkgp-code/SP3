<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPERINTENDENT OF POLICE – Paschim Medinipur</title>
    <style>
        /* स्ट्रक्चर और ओरिजिनल ग्रीन थीम वापस लाया गया है */
        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        
        :root { 
            --police-blue: #007BFF;   /* हेडर के लिए आपका नीला रंग */
            --light-green: #90EE90;   /* आपका ओरिजिनल हल्का हरा */
            --green-shadow: #76c776;  /* आपका ओरिजिनल गहरा हरा */
            --dark-bg: #1a1a1a; 
            --white-bg: #ffffff; 
            --text-color: #000000;
            --card-bg: #ffffff;
            --btn-blue: #00bcd4;
            --btn-orange: #ff9800;
        }

        body.night-mode {
            --white-bg: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
            --dark-bg: #000000;
        }
        
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; padding: 0; 
            background-color: var(--white-bg); 
            color: var(--text-color);
            overflow-x: hidden; 
            transform-origin: top center;
        }

        /* केवल हेडर सेक्शन नीला रहेगा */
        .main-header { 
            text-align: center; 
            background-color: var(--police-blue); 
            padding: 25px 10px 15px 10px; 
            color: #ffffff; 
            border-bottom: 4px solid #0056b3;
        }
        .main-title { font-size: clamp(24px, 6vw, 40px); font-weight: 900; margin: 0; text-transform: uppercase; }

        .top-actions {
            background: var(--dark-bg);
            padding: 15px 10px 5px 10px;
            display: flex;
            justify-content: center;
            gap: 8px; 
            flex-wrap: wrap; 
        }
        
        /* बाकी सारे बटन्स वापस ओरिजिनल हरे रंग में */
        .mode-btn, .links-btn { 
            padding: 12px 10px; border-radius: 10px; font-weight: 900; border: none; cursor: pointer;
            font-size: 12px; min-width: 100px; flex: 1; max-width: 150px; text-align: center; text-transform: uppercase;
        }

        .mode-btn { background-color: var(--light-green); color: #000; box-shadow: 0 4px 0 var(--green-shadow); }
        .links-btn.blue { background-color: var(--btn-blue); box-shadow: 0 4px 0 #008ba3; color: white; }
        .links-btn.orange { background-color: var(--btn-orange); box-shadow: 0 4px 0 #c67600; color: white; }

        /* नया सेक्शन: लोकेशन और सर्च बटन के लिए */
        .location-section {
            background: var(--dark-bg);
            padding: 5px 10px 15px 10px;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .location-select {
            padding: 12px 10px;
            border-radius: 10px;
            font-weight: 900;
            border: 3px solid var(--light-green);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 12px;
            min-width: 100px;
            flex: 1;
            max-width: 150px;
            cursor: pointer;
            outline: none;
            text-transform: uppercase;
        }
        .search-btn {
            background-color: var(--light-green);
            color: #000;
            box-shadow: 0 4px 0 var(--green-shadow);
            padding: 12px 10px;
            border-radius: 10px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            font-size: 12px;
            min-width: 100px;
            flex: 1;
            max-width: 150px;
            text-align: center;
            text-transform: uppercase;
        }

        /* Modals */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999; padding: 20px;
        }
        .modal-content {
            background: var(--card-bg); color: var(--text-color); max-width: 500px;
            margin: 40px auto; padding: 20px; border-radius: 20px; border: 5px solid var(--light-green);
        }
        .link-item {
            display: block; background: var(--light-green); color: #000; padding: 15px;
            margin: 10px 0; text-decoration: none; text-align: center; font-weight: bold;
            border-radius: 10px; box-shadow: 0 3px 0 var(--green-shadow);
        }

        /* Search & Nav Borders वापस हरे रंग में */
        .search-container { background: var(--dark-bg); padding: 0 15px 15px 15px; border-bottom: 3px solid var(--light-green); }
        .global-search-bar { width: 100%; max-width: 600px; padding: 15px; border-radius: 50px; border: 3px solid var(--light-green); font-size: 18px; display: block; margin: 0 auto; outline: none; }

        .nav-container { background-color: var(--dark-bg); padding: 15px 0; position: sticky; top: 0; z-index: 1000; display: flex; gap: 10px; border-bottom: 4px solid var(--light-green); overflow-x: auto; padding-left: 10px; scrollbar-width: none; }
        .tab-btn { font-size: 14px; padding: 10px 20px; font-weight: 900; cursor: pointer; border-radius: 50px; background-color: var(--light-green); color: #000; border: none; white-space: nowrap; box-shadow: 0 4px 0 var(--green-shadow); }
        .tab-btn.active { background-color: #fff; color: var(--text-color); transform: translateY(3px); box-shadow: 0 2px 0 var(--green-shadow); }

        .container { padding: 15px; max-width: 1100px; margin: auto; padding-bottom: 120px; }
        .section { display: none; }
        .section.active { display: block; }
        
        /* कार्ड बॉर्डर वापस ओरिजिनल हरे रंग में */
        .list-card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 5px solid var(--light-green); margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .ps-header {
            background-color: var(--dark-bg); color: #ffffff; padding: 15px;
            margin-bottom: 10px; border-radius: 15px; cursor: pointer; font-weight: 900;
            display: flex; justify-content: space-between; align-items: center; border: 2px solid var(--light-green);
        }
        .ps-content { display: none; padding-top: 10px; }
        .ps-content.open { display: block; }

        .btn-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; margin-top: 15px; }
        .action-btn { padding: 12px 5px; text-decoration: none; color: #000; border-radius: 50px; text-align: center; font-weight: 900; background-color: var(--light-green); border: none; font-size: 11px; }
        
        .zoom-controls { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 4000; }
        .zoom-btn { width: 50px; height: 50px; border-radius: 50%; background-color: var(--light-green); border: 3px solid var(--green-shadow); font-size: 24px; font-weight: 900; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .home-btn { background-color: var(--btn-blue); border-color: #008ba3; color: white; }
    </style>
</head>
<body>

<div class="main-header">
    <h1 class="main-title">SUPERINTENDENT OF POLICE</h1>
    <div class="main-subtitle">PASCHIM MEDINIPUR</div>
</div>

<div class="top-actions">
    <button class="mode-btn" onclick="toggleNightMode()" id="modeBtn">🌙 NIGHT MODE</button>
    <button class="links-btn blue" onclick="toggleModal('quickLinksModal')">🌐 QUICK LINKS</button>
    <button class="links-btn orange" onclick="toggleModal('importantLinksModal')">📌 IMPORTANT SITES</button>
</div>

<!-- डायनामिक स्टेट, डिस्ट्रिक्ट, सिटी सिलेक्शन -->
<div class="location-section">
    <select id="stateSelect" class="location-select" onchange="populateDistricts()">
        <option value="">-- STATE --</option>
    </select>
    
    <select id="districtSelect" class="location-select" onchange="populateCities()">
        <option value="">-- DISTRICT --</option>
    </select>

    <select id="citySelect" class="location-select">
        <option value="">-- CITY --</option>
    </select>

    <button class="search-btn" onclick="triggerLocationSearch()">🔍 SEARCH</button>
</div>

<div id="quickLinksModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center;">🌐 Quick Links</h2><hr>
        <div style="max-height: 350px; overflow-y: auto;">
            <a href="https://wmdppolicekhoj.co.in/" target="_blank" class="link-item">Khoj (Police Dept)</a>
            <a href="https://www.google.com" target="_blank" class="link-item">Google Search</a>
        </div>
        <button onclick="toggleModal('quickLinksModal')" style="width:100%; padding:10px; background:#ff4d4d; color:white; border:none; border-radius:10px; margin-top:10px; font-weight:bold; cursor:pointer;">CLOSE</button>
    </div>
</div>

<div id="importantLinksModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center;">📌 Important Sites</h2><hr>
        <div style="max-height: 350px; overflow-y: auto;">
            <a href="https://westbengalpolice.gov.in/" target="_blank" class="link-item">West Bengal Police</a>
            <a href="https://paschimmedinipur.gov.in/" target="_blank" class="link-item">District Website</a>
        </div>
        <button onclick="toggleModal('importantLinksModal')" style="width:100%; padding:10px; background:#ff4d4d; color:white; border:none; border-radius:10px; margin-top:10px; font-weight:bold; cursor:pointer;">CLOSE</button>
    </div>
</div>

<div class="search-container">
    <input type="text" id="globalSearch" class="global-search-bar" placeholder="थाना या अधिकारी खोजें..." onkeyup="globalFilter()">
</div>

<div class="nav-container" id="tabMenu"></div>
<div class="container" id="contentArea"></div>

<div class="zoom-controls">
    <button class="zoom-btn home-btn" onclick="goHome()">🏠</button>
    <button class="zoom-btn" onclick="changeZoom(0.1)">+</button>
    <button class="zoom-btn" onclick="changeZoom(-0.1)">−</button>
</div>

<script src="aspData.js"></script>
<script src="sdpoData.js"></script>
<script src="psData.js"></script>

<script>
    const shopData = { ...aspData, ...sdpoData, "police_stations": psData };

    // पूरे भारत के राज्यों, जिलों और मुख्य शहरों का डेटाबेस संरचना
    const indiaData = {
        "Andhra Pradesh": { "Visakhapatnam": ["Visakhapatnam", "Gajuwaka"], "Vijayawada": ["Vijayawada"], "Guntur": ["Guntur"] },
        "Arunachal Pradesh": { "Itanagar": ["Itanagar"], "Naharlagun": ["Naharlagun"] },
        "Assam": { "Kamrup Metro": ["Guwahati"], "Dibrugarh": ["Dibrugarh"], "Silchar": ["Silchar"] },
        "Bihar": { "Patna": ["Patna", "Danapur"], "Gaya": ["Gaya", "Bodh Gaya"], "Muzaffarpur": ["Muzaffarpur"] },
        "Chhattisgarh": { "Raipur": ["Raipur"], "Durg": ["Bhilai", "Durg"], "Bilaspur": ["Bilaspur"] },
        "Goa": { "North Goa": ["Panaji", "Mapusa"], "South Goa": ["Margao", "Vasco da Gama"] },
        "Gujarat": { "Ahmedabad": ["Ahmedabad"], "Surat": ["Surat"], "Vadodara": ["Vadodara"], "Rajkot": ["Rajkot"] },
        "Haryana": { "Gurugram": ["Gurugram"], "Faridabad": ["Faridabad"], "Ambala": ["Ambala"] },
        "Himachal Pradesh": { "Shimla": ["Shimla"], "Kangra": ["Dharamshala"], "Mandi": ["Mandi"] },
        "Jharkhand": { "Ranchi": ["Ranchi"], "East Singhbhum": ["Jamshedpur"], "Dhanbad": ["Dhanbad"] },
        "Karnataka": { "Bengaluru Urban": ["Bengaluru"], "Mysuru": ["Mysuru"], "Hubli-Dharwad": ["Hubli"] },
        "Kerala": { "Thiruvananthapuram": ["Thiruvananthapuram"], "Ernakulam": ["Kochi"], "Kozhikode": ["Kozhikode"] },
        "Madhya Pradesh": { "Indore": ["Indore"], "Bhopal": ["Bhopal"], "Gwalior": ["Gwalior"], "Jabalpur": ["Jabalpur"] },
        "Maharashtra": { "Mumbai City": ["Mumbai"], "Pune": ["Pune"], "Nagpur": ["Nagpur"], "Thane": ["Thane"] },
        "Manipur": { "Imphal West": ["Imphal"], "Churachandpur": ["Churachandpur"] },
        "Meghalaya": { "East Khasi Hills": ["Shillong"], "West Garo Hills": ["Tura"] },
        "Mizoram": { "Aizawl": ["Aizawl"], "Lunglei": ["Lunglei"] },
        "Nagaland": { "Dimapur": ["Dimapur"], "Kohima": ["Kohima"] },
        "Odisha": { "Khordha": ["Bhubaneswar"], "Cuttack": ["Cuttack"], "Ganjam": ["Berhampur"] },
        "Punjab": { "Amritsar": ["Amritsar"], "Ludhiana": ["Ludhiana"], "Jalandhar": ["Jalandhar"] },
        "Rajasthan": { "Jaipur": ["Jaipur"], "Jodhpur": ["Jodhpur"], "Udaipur": ["Udaipur"], "Kota": ["Kota"] },
        "Sikkim": { "Gangtok": ["Gangtok"], "Namchi": ["Namchi"] },
        "Tamil Nadu": { "Chennai": ["Chennai"], "Coimbatore": ["Coimbatore"], "Madurai": ["Madurai"] },
        "Telangana": { "Hyderabad": ["Hyderabad"], "Warangal": ["Warangal"], "Nizamabad": ["Nizamabad"] },
        "Tripura": { "West Tripura": ["Agartala"], "Unakoti": ["Kailashahar"] },
        "Uttar Pradesh": { "Lucknow": ["Lucknow"], "Kanpur Nagar": ["Kanpur"], "Gautam Buddha Nagar": ["Noida"], "Agra": ["Agra"], "Varanasi": ["Varanasi"] },
        "Uttarakhand": { "Dehradun": ["Dehradun", "Rishikesh"], "Nainital": ["Haldwani", "Nainital"] },
        "West Bengal": { 
            "Paschim Medinipur": ["Kharagpur", "Medinipur", "Ghatal", "Belda"], 
            "Purba Medinipur": ["Tamluk", "Haldia", "Digha"], 
            "Kolkata": ["Kolkata"] 
        }
    };

    // स्टेट ड्रॉपडाउन को लोड करना
    function populateStates() {
        const stateSelect = document.getElementById('stateSelect');
        Object.keys(indiaData).sort().forEach(state => {
            let opt = document.createElement('option');
            opt.value = state;
            opt.innerText = state;
            stateSelect.appendChild(opt);
        });
    }

    // स्टेट सेलेक्ट करने पर डिस्ट्रिक्ट लोड करना
    function populateDistricts() {
        const stateSelect = document.getElementById('stateSelect').value;
        const districtSelect = document.getElementById('districtSelect');
        const citySelect = document.getElementById('citySelect');
        
        districtSelect.innerHTML = '<option value="">-- DISTRICT --</option>';
        citySelect.innerHTML = '<option value="">-- CITY --</option>';
        
        if (stateSelect && indiaData[stateSelect]) {
            Object.keys(indiaData[stateSelect]).sort().forEach(district => {
                let opt = document.createElement('option');
                opt.value = district;
                opt.innerText = district;
                districtSelect.appendChild(opt);
            });
        }
    }

    // डिस्ट्रिक्ट सेलेक्ट करने पर सिटी लोड करना
    function populateCities() {
        const stateSelect = document.getElementById('stateSelect').value;
        const districtSelect = document.getElementById('districtSelect').value;
        const citySelect = document.getElementById('citySelect');
        
        citySelect.innerHTML = '<option value="">-- CITY --</option>';
        
        if (stateSelect && districtSelect && indiaData[stateSelect][districtSelect]) {
            indiaData[stateSelect][districtSelect].sort().forEach(city => {
                let opt = document.createElement('option');
                opt.value = city;
                opt.innerText = city;
                citySelect.appendChild(opt);
            });
        }
    }

    // सर्च बटन पर केवल उस सिटी का डेटा फ़िल्टर करना
    function triggerLocationSearch() {
        const city = document.getElementById('citySelect').value.toLowerCase();
        
        if (!city) {
            // अगर कोई सिटी नहीं चुनी, तो सब रीसेट करके सब दिखाओ
            document.querySelectorAll('.list-card').forEach(card => card.style.style.display = "block");
            return;
        }

        const activeSection = document.querySelector('.section.active');
        if (activeSection) {
            const cards = activeSection.querySelectorAll('.list-card');
            cards.forEach(card => {
                const isMatch = card.innerText.toLowerCase().includes(city);
                card.style.display = isMatch ? "block" : "none";
                
                // अगर मैच मिलता है तो पुलिस स्टेशन की हेडिंग को ऑटोमैटिक खोलें
                if (isMatch) {
                    const parent = card.closest('.ps-content');
                    if (parent) {
                        parent.classList.add('open');
                        const header = parent.previousElementSibling;
                        if (header) {
                            const icon = header.querySelector('.ps-icon');
                            if (icon) icon.innerText = '▲';
                        }
                    }
                }
            });
        }
    }

    function toggleNightMode() {
        document.body.classList.toggle('night-mode');
        const isNight = document.body.classList.contains('night-mode');
        localStorage.setItem('theme', isNight ? 'night' : 'light');
        updateModeButton(isNight);
    }

    function updateModeButton(isNight) {
        const btn = document.getElementById('modeBtn');
        if (btn) btn.innerHTML = isNight ? "☀️ LIGHT MODE" : "🌙 NIGHT MODE";
    }

    function toggleModal(id) {
        const m = document.getElementById(id);
        if (m) m.style.display = (m.style.display === "block") ? "none" : "block";
    }

    function changeZoom(delta) {
        let currentZoom = parseFloat(document.body.style.zoom) || 1.0;
        currentZoom += delta;
        document.body.style.zoom = Math.min(Math.max(currentZoom, 0.8), 1.5);
    }

    function goHome() { location.reload(); }

    function togglePS(header) {
        const content = header.nextElementSibling;
        const icon = header.querySelector('.ps-icon');
        if (content.classList.contains('open')) {
            content.classList.remove('open');
            icon.innerText = '▼';
        } else {
            content.classList.add('open');
            icon.innerText = '▲';
        }
    }

    window.onload = function() {
        const savedTheme = localStorage.getItem('theme');
        if(savedTheme === 'night') {
            document.body.classList.add('night-mode');
            updateModeButton(true);
        }
        populateStates(); // राज्यों की लिस्ट लोड करें
        init();
    };

    function init() {
        shopData.police_stations.partners.sort((a, b) => a.ps_name.localeCompare(b.ps_name));
        const tabMenu = document.getElementById('tabMenu');
        const contentArea = document.getElementById('contentArea');
        createTab("📁 DIRECTORY", "directory", true);
        Object.keys(shopData).forEach(key => createTab(shopData[key].title, key, false));

        const dirSection = document.createElement('div');
        dirSection.id = 'directory';
        dirSection.className = "section active";
        
        Object.keys(shopData).forEach(key => {
            const section = document.createElement('div');
            section.id = key;
            section.className = "section";
            let html = "";
            if (key === "police_stations") {
                const grouped = {};
                shopData[key].partners.forEach(p => {
                    if (!grouped[p.ps_name]) grouped[p.ps_name] = [];
                    grouped[p.ps_name].push(p);
                });
                Object.keys(grouped).forEach(psName => {
                    html += `
                        <div class="ps-header" onclick="togglePS(this)">
                            <span>🚨 ${psName} Police Station</span>
                            <span class="ps-icon">▼</span>
                        </div>
                        <div class="ps-content">
                            ${grouped[psName].map(p => createCard(p)).join('')}
                        </div>`;
                });
            } else {
                html = shopData[key].partners.map(p => createCard(p)).join('');
            }
            section.innerHTML = html;
            dirSection.innerHTML += html;
            contentArea.appendChild(section);
        });
        contentArea.prepend(dirSection);
    }

    function createTab(text, id, active) {
        const btn = document.createElement('button');
        btn.className = `tab-btn ${active ? 'active' : ''}`;
        btn.innerText = text;
        btn.onclick = (e) => showSection(id, e.target);
        document.getElementById('tabMenu').appendChild(btn);
    }

    function createCard(p) {
        return `
            <div class="list-card">
                <h3 style="color:var(--green-shadow); margin-top:0;">${p.name}</h3>
                <p>🎖️ <b>Rank:</b> ${p.rank || 'N/A'}</p>
                <p>📞 <b>Mobile:</b> ${p.mobile}</p>
                <div class="btn-group">
                    <a href="tel:${p.mobile}" class="action-btn">📞 CALL</a>
                    ${p.landline ? `<a href="tel:${p.landline}" class="action-btn">☎️ LANDLINE</a>` : ""}
                    <a href="https://wa.me/${p.whatsapp}" class="action-btn">💬 WHATSAPP</a>
                </div>
            </div>`;
    }

    function showSection(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const target = document.getElementById(id);
        if (target) target.classList.add('active');
        btn.classList.add('active');
    }

    function globalFilter() {
        const term = document.getElementById('globalSearch').value.toLowerCase();
        const activeSection = document.querySelector('.section.active');
        if (activeSection) {
            const cards = activeSection.querySelectorAll('.list-card');
            cards.forEach(card => {
                const isMatch = card.innerText.toLowerCase().includes(term);
                card.style.display = isMatch ? "block" : "none";
                if (term.length > 0 && isMatch) {
                    const parent = card.closest('.ps-content');
                    if (parent) parent.classList.add('open');
                }
            });
        }
    }
</script>
</body>
</html>
